name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-13
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: game-booster-app
        run: npm install

      - name: Build macOS DMG
        working-directory: game-booster-app
        run: npx electron-builder --mac dmg --publish never -c.mac.identity=null
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List built files
        run: ls -la game-booster-app/dist/

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          files: game-booster-app/dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
