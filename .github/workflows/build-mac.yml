name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-13
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd game-booster-app && npm ci || npm install
      - run: cd game-booster-app && npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - run: ls -la game-booster-app/dist/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          files: game-booster-app/dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
