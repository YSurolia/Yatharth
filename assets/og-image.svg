<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="yatharth.org social share image">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#161D38"/>
      <stop offset="1" stop-color="#080B18"/>
    </linearGradient>
    <linearGradient id="yblue" x1="30" y1="26" x2="70" y2="74" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5C7BFF"/>
      <stop offset="1" stop-color="#2242FF"/>
    </linearGradient>
    <radialGradient id="halo" cx="50" cy="52" r="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2242FF" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#2242FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTR" cx="88%" cy="6%" r="58%">
      <stop offset="0" stop-color="#2242FF" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#2242FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBL" cx="8%" cy="96%" r="56%">
      <stop offset="0" stop-color="#2242FF" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#2242FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2242FF"/>
      <stop offset="1" stop-color="#5C7BFF"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#050505"/>
  <rect width="1200" height="630" fill="url(#glowTR)"/>
  <rect width="1200" height="630" fill="url(#glowBL)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#bar)"/>

  <!-- logo mark -->
  <g transform="translate(534,104) scale(1.32)">
    <rect x="2" y="2" width="96" height="96" rx="24" fill="url(#tile)" stroke="#2242FF" stroke-opacity="0.45" stroke-width="2"/>
    <circle cx="50" cy="52" r="38" fill="url(#halo)"/>
    <g fill="none" stroke="url(#yblue)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
      <path d="M32 28 L50 52 L68 28"/>
      <path d="M50 52 L50 72"/>
    </g>
  </g>

  <!-- name -->
  <text x="600" y="356" text-anchor="middle" font-family="Space Grotesk, Segoe UI, Arial, sans-serif" font-weight="700" font-size="104" letter-spacing="-2" fill="#F5EEE9">Yatharth</text>

  <!-- tagline -->
  <text x="600" y="414" text-anchor="middle" font-family="Space Grotesk, Segoe UI, Arial, sans-serif" font-weight="500" font-size="33" letter-spacing="0.5" fill="#9FB0E8">Personal site &amp; portfolio</text>

  <!-- domain pill -->
  <rect x="466" y="470" width="268" height="56" rx="28" fill="#2242FF" fill-opacity="0.14" stroke="#5C7BFF" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="600" y="506" text-anchor="middle" font-family="Space Grotesk, Segoe UI, Arial, sans-serif" font-weight="600" font-size="27" letter-spacing="0.5" fill="#C7D2FF">yatharth.org</text>
</svg>
