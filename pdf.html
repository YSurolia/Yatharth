<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo PDF Converter Web Example</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(180deg, #f7fbff 0%, #edf5ff 100%);
        color: #13263d;
      }

      .page {
        width: min(1200px, calc(100% - 24px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }

      .intro {
        margin-bottom: 18px;
        padding: 24px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.84);
        border: 1px solid rgba(191, 210, 236, 0.9);
        box-shadow: 0 20px 44px rgba(35, 86, 150, 0.1);
      }

      h1 {
        margin: 0 0 10px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: #60718a;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="intro">
        <h1>Website-ready Photo to PDF Converter</h1>
        <p>
          This page shows the exact web setup. You can either use the custom tag directly
          or mount it with JavaScript on any container in your website.
        </p>
      </div>

      <photo-pdf-converter
        heading="Photo to PDF"
        subheading="Upload photos, reorder them, and export one clean PDF."
        filename="my-photos"
      ></photo-pdf-converter>
    </div>

    <script src="./photo-pdf-converter-single.js"></script>
  </body>
</html>
